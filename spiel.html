<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schul-Flucht: Level 1</title>
    <style>
        body { background: #0f172a; color: #38bdf8; text-align: center; font-family: 'Courier New', monospace; }
        #game { background: #2d3748; border: 4px solid #38bdf8; margin: 20px auto; display: block; }
        .hidden { display: none; }
        #next-btn { padding: 10px 20px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Level 1: Handy holen & Raus hier!</h1>
    <canvas id="game" width="600" height="400"></canvas>
    <div id="win-screen" class="hidden">
        <p>Erfolgreich entkommen!</p>
        <button id="next-btn" onclick="window.location.href='level2.html'">Zu Level 2</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let player = {x: 50, y: 350, hasPhone: false};
        let teacher = {x: 300, y: 200, stopped: false};
        let phone = {x: 550, y: 50};
        let door = {x: 580, y: 350, w: 20, h: 50};
        let confetti = [];

        function drawPerson(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(x + 10, y + 5, 8, 0, Math.PI * 2); ctx.fill();
            ctx.fillRect(x + 5, y + 15, 10, 15);
        }

        function update() {
            // Lehrer bewegt sich nur, wenn er nicht gestoppt wurde[span_2](start_span)[span_2](end_span)
            if (!teacher.stopped) {
                if (teacher.x < player.x) teacher.x += 0.8; else teacher.x -= 0.8;
                if (teacher.y < player.y) teacher.y += 0.8; else teacher.y -= 0.8;
            }

            // Kollision Lehrer
            if (!teacher.stopped && Math.abs(player.x - teacher.x) < 20 && Math.abs(player.y - teacher.y) < 20) {
                player = {x: 50, y: 350, hasPhone: false};
            }

            // Handy einsammeln
            if (!player.hasPhone && Math.abs(player.x - phone.x) < 20 && Math.abs(player.y - phone.y) < 20) {
                player.hasPhone = true;
                teacher.stopped = true; // Lehrer stoppt bei Sieg[span_3](start_span)[span_3](end_span)
                for(let i=0; i<30; i++) confetti.push({x: phone.x, y: phone.y, dx: Math.random()*4-2, dy: Math.random()*4-2});
            }

            // Siegbedingung
            if (player.hasPhone && player.x > door.x - 20) {
                document.getElementById('win-screen').classList.remove('hidden');
            }
        }

        function draw() {
            ctx.clearRect(0,0,600,400);
            ctx.fillStyle = "#10b981"; ctx.fillRect(door.x, door.y, door.w, door.h);
            
            drawPerson(player.x, player.y, player.hasPhone ? "#fbbf24" : "#38bdf8");
            drawPerson(teacher.x, teacher.y, "#ef4444");
            
            if(!player.hasPhone) { ctx.fillStyle = "#f59e0b"; ctx.fillRect(phone.x, phone.y, 15, 15); }
            
            confetti.forEach(c => {
                c.x += c.dx; c.y += c.dy;
                ctx.fillStyle = "gold"; ctx.fillRect(c.x, c.y, 4, 4);
            });
            
            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', (e) => {
            let nextX = player.x;
            let nextY = player.y;
            if(e.key === 'ArrowRight') nextX += 20;
            if(e.key === 'ArrowLeft') nextX -= 20;
            if(e.key === 'ArrowUp') nextY -= 20;
            if(e.key === 'ArrowDown') nextY += 20;

            // Grenzen einhalten[span_4](start_span)[span_4](end_span)[span_5](start_span)[span_5](end_span)
            if (nextX >= 0 && nextX <= 580) player.x = nextX;
            if (nextY >= 0 && nextY <= 380) player.y = nextY;
        });

        draw();
    </script>
</body>
</html>
