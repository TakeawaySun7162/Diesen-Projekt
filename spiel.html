<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schul-Flucht: Level 1</title>
    <style>
        body { background: #0f172a; color: #38bdf8; text-align: center; font-family: 'Courier New', monospace; }
        #game { background: #2d3748; border: 4px solid #38bdf8; margin: 20px auto; display: block; }
        .hidden { display: none; }
        #next-btn { padding: 10px 20px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Level 1: Hol dir dein Handy!</h1>
    <canvas id="game" width="600" height="400"></canvas>
    <div id="win-screen" class="hidden">
        <p>Geschafft! Ab in den Flur.</p>
        <button id="next-btn" onclick="window.location.href='level2.html'">Zu Level 2</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let player = {x: 50, y: 350};
        let teacher = {x: 300, y: 200};
        let phone = {x: 550, y: 50};

        // Funktion zum Zeichnen eines Pixel-Menschen
        function drawPerson(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x + 10, y + 5, 8, 0, Math.PI * 2); // Kopf
            ctx.fill();
            ctx.fillRect(x + 5, y + 15, 10, 15); // Körper
        }

        function update() {
            // Lehrer verfolgt Spieler sanft
            if (teacher.x < player.x) teacher.x += 1.0; else teacher.x -= 1.0;
            if (teacher.y < player.y) teacher.y += 1.0; else teacher.y -= 1.0;

            // Kollisionsabfrage
            if (Math.abs(player.x - teacher.x) < 20 && Math.abs(player.y - teacher.y) < 20) {
                player = {x: 50, y: 350}; 
            }

            if (Math.abs(player.x - phone.x) < 20 && Math.abs(player.y - phone.y) < 20) {
                document.getElementById('win-screen').classList.remove('hidden');
            }
        }

        function draw() {
            ctx.clearRect(0,0,600,400);
            
            drawPerson(player.x, player.y, "#38bdf8"); // Spieler in Blau
            drawPerson(teacher.x, teacher.y, "#ef4444"); // Lehrer in Rot
            
            // Handy als kleines gelbes Rechteck
            ctx.fillStyle = "#f59e0b"; 
            ctx.fillRect(phone.x, phone.y, 15, 15);
            
            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight') player.x += 20;
            if(e.key === 'ArrowLeft') player.x -= 20;
            if(e.key === 'ArrowUp') player.y -= 20;
            if(e.key === 'ArrowDown') player.y += 20;
        });

        draw();
    </script>
</body>
</html>
