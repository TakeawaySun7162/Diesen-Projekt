<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schul-Flucht: Level 2</title>
    <style>
        body { background: #0f172a; color: #38bdf8; text-align: center; font-family: 'Courier New', monospace; }
        #game { background: #2d3748; border: 4px solid #38bdf8; margin: 20px auto; display: block; }
        .hidden { display: none; }
        #next-btn { padding: 10px 20px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Level 2: Unbemerkt abschreiben</h1>
    <p>Leertaste halten zum Abschreiben. Nutze Gelb, aber hüte dich vor der unvorhersehbaren ROTEN Phase!</p>
    <canvas id="game" width="600" height="400"></canvas>
    <div id="win-screen" class="hidden">
        <p>Perfekt abgeschrieben! Auf zum Flur.</p>
        <button id="next-btn" onclick="window.location.href='level3.html'">Zu Level 3</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let progress = 0;
        let isWriting = false;
        
        // Lehrer-Zustände: 0 = Grün (Tafel), 1 = Gelb (dreht sich), 2 = Rot (Klasse)
        let teacherState = 0; 
        let nextTeacherState = 2; 
        let stateTimer = 0;
        let lastTime = Date.now();
        
        // Erste Zufallsdauer für die grüne Phase (zwischen 1.5 und 4 Sekunden)
        let targetChangeDuration = Math.random() * 2500 + 1500; 

        function drawTeacher() {
            let primaryColor = teacherState === 0 ? "#10b981" : (teacherState === 1 ? "#fbbf24" : "#ef4444");
            ctx.fillStyle = primaryColor;
            
            // Kopf
            ctx.beginPath(); ctx.arc(300, 70, 20, 0, Math.PI * 2); ctx.fill(); 
            
            // Torso (Körper)
            ctx.fillRect(280, 90, 40, 55);
            
            // Beine (Immer sichtbar)
            ctx.fillRect(285, 145, 10, 45); // Linkes Bein
            ctx.fillRect(305, 145, 10, 45); // Rechtes Bein

            // Arme und Gesicht je nach Zustand animieren
            if (teacherState === 0) {
                // An der Tafel (Grün): Ein Arm unten, einer oben am Schreiben
                ctx.fillRect(268, 90, 10, 35); // Linker Arm hängt
                ctx.fillRect(322, 65, 10, 35); // Rechter Arm zeigt zur Tafel
                
                // Stück Kreide zeichnen
                ctx.fillStyle = "white";
                ctx.fillRect(325, 60, 5, 5);
            } 
            else if (teacherState === 1) {
                // Am Umdrehen (Gelb): Arme bewegen sich zur Seite
                ctx.fillRect(270, 90, 10, 40);
                ctx.fillRect(320, 90, 10, 40);
                
                // Ein Auge im Profil sichtbar
                ctx.fillStyle = "black";
                let eyeX = nextTeacherState === 2 ? 310 : 284;
                ctx.fillRect(eyeX, 65, 6, 6);
            } 
            else if (teacherState === 2) {
                // Schaut in die Klasse (Rot): Wütende Pose (Arme in die Hüfte gestemmt)
                ctx.fillRect(266, 95, 12, 25); // Ellbogen links ausgestellt
                ctx.fillRect(322, 95, 12, 25); // Ellbogen rechts ausgestellt
                
                // Böses Gesicht zeichnen
                ctx.fillStyle = "black";
                ctx.fillRect(288, 65, 5, 5); // Linkes Auge
                ctx.fillRect(307, 65, 5, 5); // Rechtes Auge
                
                // Böse, schräge Augenbrauen
                ctx.fillRect(285, 58, 9, 3);
                ctx.fillRect(306, 58, 9, 3);
                
                // Strenger Mund
                ctx.fillRect(292, 78, 16, 3);
            }
        }

        function drawPlayer() {
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(280, 250, 40, 50); // Körper
            ctx.beginPath(); ctx.arc(300, 235, 20, 0, Math.PI * 2); ctx.fill(); // Kopf
            
            ctx.fillStyle = "#854d0e"; ctx.fillRect(240, 280, 120, 30); // Tisch
            ctx.fillStyle = "white"; ctx.fillRect(275, 285, 30, 20); // Papier

            // Stift-Animation
            ctx.fillStyle = "#facc15"; 
            if (isWriting && progress < 100) {
                let offset = Math.sin(Date.now() / 40) * 12;
                ctx.fillRect(285 + offset, 280, 4, 15);
            } else {
                ctx.fillRect(310, 290, 15, 4);
            }
        }

        function update() {
            let now = Date.now();
            let dt = now - lastTime;
            lastTime = now;
            stateTimer += dt;

            // VOLLKOMMEN ZUFÄLLIGE LEHRER-KI
            if (stateTimer >= targetChangeDuration) {
                stateTimer = 0;
                
                if (teacherState === 0) {
                    // Von Grün zu Gelb (Vorwarnung)
                    teacherState = 1;
                    nextTeacherState = 2;
                    targetChangeDuration = Math.random() * 300 + 400; // Gelb-Dauer: 0.4 bis 0.7 Sek
                } 
                else if (teacherState === 1) {
                    // Von Gelb zum Ziel-Zustand (Rot oder wieder Grün)
                    teacherState = nextTeacherState;
                    if (teacherState === 2) {
                        // Wie lange starrt er die Klasse an? (0.8 bis 3 Sekunden - völlig unberechenbar!)
                        targetChangeDuration = Math.random() * 2200 + 800; 
                    } else {
                        // Wie lange schreibt er an der Tafel? (1.2 bis 4.5 Sekunden)
                        targetChangeDuration = Math.random() * 3300 + 1200; 
                    }
                } 
                else if (teacherState === 2) {
                    // Von Rot zurück zu Gelb (dreht sich wieder um)
                    teacherState = 1;
                    nextTeacherState = 0;
                    targetChangeDuration = Math.random() * 300 + 400; 
                }
            }

            // Abschreib-Fortschritt
            if (isWriting && progress < 100) {
                if (teacherState === 2) {
                    progress = 0; // Nur bei echtem ROT fliegt man auf!
                } else {
                    progress += 0.2; // Schnelles, flüssiges Befüllen bei Grün und Gelb
                }
            }

            if (progress >= 100) {
                document.getElementById('win-screen').classList.remove('hidden');
                progress = 100;
            }
        }

        function draw() {
            ctx.clearRect(0,0,600,400);
            
            drawTeacher();
            drawPlayer();

            // Balken
            ctx.fillStyle = "#1e293b"; ctx.fillRect(150, 350, 300, 20);
            ctx.fillStyle = (progress >= 100) ? "#10b981" : "#38bdf8";
            ctx.fillRect(150, 350, progress * 3, 20);
            
            ctx.fillStyle = "white";
            ctx.font = "16px Courier New";
            ctx.fillText("Fortschritt: " + Math.floor(progress) + "%", 230, 340);
            
            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', (e) => { if(e.key === ' ') isWriting = true; });
        window.addEventListener('keyup', (e) => { if(e.key === ' ') isWriting = false; });

        draw();
    </script>
</body>
</html>
