<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schul-Flucht: Level 2</title>
    <style>
        body { background: #0f172a; color: #38bdf8; text-align: center; font-family: 'Courier New', monospace; }
        #game { background: #2d3748; border: 4px solid #38bdf8; margin: 20px auto; display: block; }
        .hidden { display: none; }
        #next-btn { padding: 10px 20px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Level 2: Unbemerkt abschreiben</h1>
    <p>Leertaste halten zum Abschreiben, wenn der Lehrer zur Tafel schaut!</p>
    <canvas id="game" width="600" height="400"></canvas>
    <div id="win-screen" class="hidden">
        <p>Erwischt! Ab in den Flur.</p>
        <button id="next-btn" onclick="window.location.href='level3.html'">Zu Level 3</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let progress = 0;
        let isWriting = false;
        let teacherLooking = false; // true = schaut zur Klasse
        
        // Lehrer-Logik: Wechselt zufällig den Blick
        setInterval(() => {
            teacherLooking = Math.random() > 0.5;
        }, 1500);

        function update() {
            if (isWriting) {
                if (teacherLooking) {
                    progress = 0; // Erwischt!
                } else {
                    progress += 0.5; // Fortschritt machen
                }
            }
            if (progress >= 100) {
                document.getElementById('win-screen').classList.remove('hidden');
            }
        }

        function draw() {
            ctx.clearRect(0,0,600,400);
            
            // Lehrer (oben mittig)
            ctx.fillStyle = teacherLooking ? "#ef4444" : "#10b981";
            ctx.fillRect(250, 50, 100, 100);
            ctx.fillStyle = "white";
            ctx.fillText(teacherLooking ? "LEHRER GUCKT!" : "Lehrer schreibt Tafel", 260, 40);

            // Fortschrittsbalken
            ctx.fillStyle = "#1e293b"; ctx.fillRect(150, 300, 300, 30);
            ctx.fillStyle = "#38bdf8"; ctx.fillRect(150, 300, progress * 3, 30);
            
            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', (e) => { if(e.key === ' ') isWriting = true; });
        window.addEventListener('keyup', (e) => { if(e.key === ' ') isWriting = false; });

        draw();
    </script>
</body>
</html>
