<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schul-Flucht: Level 3</title>
    <style>
        body { background: #0f172a; color: #38bdf8; text-align: center; font-family: 'Courier New', monospace; margin: 0; padding-top: 10px; }
        #game { background: #1e293b; border: 4px solid #38bdf8; margin: 10px auto; display: block; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .hidden { display: none; }
        .ui-panel { max-width: 600px; margin: 0 auto; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        #win-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #win-btn { padding: 15px 30px; background: #10b981; border: none; color: white; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px #10b981; }
        .alarm-flash { animation: flash 0.4s infinite alternate; }
        @keyframes flash { 0% { background: #7f1d1d; } 100% { background: #1e293b; } }
    </style>
</head>
<body>
    <h1>Level 3: Ablenkung im Flur!</h1>
    <div class="ui-panel">
        <span id="status">STATUS: Schleichen...</span>
        <span>Ziel: Erreiche den Feueralarm!</span>
    </div>
    
    <canvas id="game" width="600" height="400"></canvas>

    <div id="win-screen" class="hidden">
        <h1 style="color: #10b981; font-size: 40px; margin-bottom: 10px;">FEUERALARM AUSGELÖST! 🔥</h1>
        <p style="color: white; font-size: 18px; margin-bottom: 30px;">Die Schule brennt nicht, aber alle laufen panisch raus. DU BIST FREI!</p>
        <button id="win-btn" onclick="alert('Du hast das Spiel erfolgreich gemeistert!')">GEWONNEN!</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let keys = {};
        let gameWon = false;
        let showCaughtTicker = 0;

        // Spieler initialisieren (unten links)
        let player = { x: 45, y: 340, w: 20, h: 35, speed: 3, hidden: false };

        // Die Wände des Schulflurs (Kollisionsboxen)
        const walls = [
            // Außenmauern
            { x: 0, y: 0, w: 600, h: 20 },
            { x: 0, y: 380, w: 600, h: 20 },
            { x: 0, y: 0, w: 20, h: 400 },
            { x: 580, y: 0, w: 20, h: 400 },
            // Innenwände des Labyrinths
            { x: 120, y: 100, w: 20, h: 280 }, // Wand links
            { x: 120, y: 100, w: 340, h: 20 },  // Obere Querwand
            { x: 280, y: 200, w: 20, h: 180 }, // Mittlere Trennwand
            { x: 450, y: 20, w: 20, h: 270 }   // Rechte Wand
        ];

        // Spinde zum Verstecken
        const lockers = [
            { x: 25, y: 160, w: 25, h: 50, id: "Spind 1" },
            { x: 220, y: 40, w: 50, h: 25, id: "Spind 2" },
            { x: 340, y: 330, w: 50, h: 25, id: "Spind 3" },
            { x: 530, y: 180, w: 25, h: 50, id: "Spind 4" }
        ];

        // Der rote Feueralarm-Kasten (Ziel unten rechts)
        const fireAlarm = { x: 520, y: 320, w: 35, h: 35 };

        // Lehrer-Patrouillen mit eigenen Routen und Laufrichtungen
        let teachers = [
            { x: 45, y: 60, dir: 1, axis: 'y', min: 40, max: 320, speed: 2 },      // Linker Gang
            { x: 160, y: 45, dir: 1, axis: 'x', min: 150, max: 410, speed: 2.5 }, // Oberer Querflur
            { x: 500, y: 60, dir: 1, axis: 'y', min: 40, max: 280, speed: 3 }      // Rechter Gang
        ];

        // Tasten-Abfrage für flüssige Pixelbewegung
        window.addEventListener('keydown', e => { 
            keys[e.key] = true; 
            if (e.key === ' ' || e.key === 'Spacebar') handleHiding();
        });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function handleHiding() {
            if (gameWon) return;
            if (player.hidden) {
                // Aus dem Spind heraustreten
                player.hidden = false;
                document.getElementById('status').innerText = "STATUS: Schleichen...";
                document.getElementById('status').style.color = "#38bdf8";
            } else {
                // Prüfen ob man nah genug an einem Spind steht
                let currentLocker = lockers.find(l => checkCollision(player, l));
                if (currentLocker) {
                    player.hidden = true;
                    // Spieler optisch sauber im Spind positionieren
                    player.x = currentLocker.x + (currentLocker.w - player.w) / 2;
                    player.y = currentLocker.y + (currentLocker.h - player.h) / 2;
                    document.getElementById('status').innerText = "STATUS: IM SPIND VERSTECKT!";
                    document.getElementById('status').style.color = "#10b981";
                }
            }
        }

        function update() {
            if (gameWon) return;

            // Bewegung des Spielers (nur wenn nicht versteckt)
            if (!player.hidden) {
                let nextX = player.x;
                let nextY = player.y;

                if (keys['ArrowRight']) nextX += player.speed;
                if (keys['ArrowLeft']) nextX -= player.speed;
                if (keys['ArrowUp']) nextY -= player.speed;
                if (keys['ArrowDown']) nextY += player.speed;

                // Kollisionsprüfung mit Wänden für X-Achse
                let tempPlayer = { ...player, x: nextX };
                let hitWallX = walls.some(w => checkCollision(tempPlayer, w));
                if (!hitWallX) player.x = nextX;

                // Kollisionsprüfung mit Wänden für Y-Achse
                tempPlayer = { ...player, y: nextY };
                let hitWallY = walls.some(w => checkCollision(tempPlayer, w));
                if (!hitWallY) player.y = nextY;
            }

            // Lehrer-Bewegung aktualisieren
            teachers.forEach(t => {
                if (t.axis === 'y') {
                    t.y += t.speed * t.dir;
                    if (t.y <= t.min || t.y >= t.max) t.dir *= -1; // Richtung umkehren
                } else {
                    t.x += t.speed * t.dir;
                    if (t.x <= t.min || t.x >= t.max) t.dir *= -1;
                }

                // Erwischt-Logik: Lehrer berührt Spieler und Spieler ist nicht versteckt
                if (!player.hidden && checkCollision(player, t)) {
                    player.x = 45;
                    player.y = 340; // Zurück zum Start von Level 3
                    showCaughtTicker = 60; // Aktiviert kurzen visuellen Effekt
                }
            });

            // Ziel-Prüfung: Feueralarm berührt?
            if (checkCollision(player, fireAlarm)) {
                gameWon = true;
                document.getElementById('game').classList.add('alarm-flash');
                document.getElementById('win-screen').classList.remove('hidden');
            }

            if (showCaughtTicker > 0) showCaughtTicker--;
        }

        function drawPerson(x, y, color, isTeacher, dir) {
            ctx.fillStyle = color;
            // Kopf
            ctx.beginPath(); ctx.arc(x + 10, y + 8, 8, 0, Math.PI * 2); ctx.fill();
            // Torso
            ctx.fillRect(x + 3, y + 16, 14, 14);
            // Beine (watschelnde Pixel-Animation basierend auf Zeit)
            let legOffset = Math.sin(Date.now() / 100) > 0 ? 2 : -2;
            if (gameWon || player.hidden && !isTeacher) legOffset = 0;
            ctx.fillRect(x + 4, y + 30, 4, 8 + (isTeacher ? 0 : legOffset));
            ctx.fillRect(x + 12, y + 30, 4, 8 - (isTeacher ? 0 : legOffset));

            // Gesichter zeichnen
            ctx.fillStyle = "black";
            if (isTeacher) {
                // Lehrer blicken grimmig in Laufrichtung
                let eyeLook = dir > 0 ? 2 : -2;
                ctx.fillRect(x + 8 + eyeLook, 6, 3, 3);
                ctx.fillRect(x + 12 + eyeLook, 6, 3, 3);
                ctx.fillRect(x + 7, 12, 6, 2); // Strenger Mund
            } else {
                // Spieler Augen
                ctx.fillRect(x + 7, 7, 2, 2);
                ctx.fillRect(x + 11, 7, 2, 2);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Spinde zeichnen (Metallic-Grau mit Retro-Schlitzen)
            lockers.forEach(l => {
                ctx.fillStyle = "#475569"; ctx.fillRect(l.x, l.y, l.w, l.h);
                ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 2; ctx.strokeRect(l.x, l.y, l.w, l.h);
                // Lüftungsschlitze reinpixeln
                ctx.fillStyle = "#334155";
                if (l.w > l.h) {
                    ctx.fillRect(l.x + 10, l.y + 10, 30, 4);
                } else {
                    ctx.fillRect(l.x + 10, l.y + 10, 4, 30);
                }
            });

            // 2. Wände zeichnen
            ctx.fillStyle = "#334155";
            walls.forEach(w => ctx.fillRect(w.x, w.w === 20 || w.w === 600 ? w.y : w.y, w.w, w.h));

            // 3. Feueralarm zeichnen
            ctx.fillStyle = "#dc2626"; ctx.fillRect(fireAlarm.x, fireAlarm.y, fireAlarm.w, fireAlarm.h);
            ctx.fillStyle = "#fbbf24"; ctx.fillRect(fireAlarm.x + 10, fireAlarm.y + 10, 15, 15); // Glasscheibe
            ctx.fillStyle = "white"; ctx.font = "8px sans-serif"; ctx.fillText("ALARM", fireAlarm.x + 2, fireAlarm.y + 8);

            // 4. Lehrer zeichnen
            teachers.forEach(t => {
                drawPerson(t.x, t.y, "#ef4444", true, t.dir);
            });

            // 5. Spieler zeichnen (Ausblenden, wenn im Spind versteckt)
            if (!player.hidden) {
                drawPerson(player.x, player.y, "#38bdf8", false, 0);
            } else {
                // Kleiner Hinweis über dem Spind, wo man drinsteckt
                ctx.fillStyle = "rgba(16, 185, 129, 0.6)";
                ctx.font = "10px Courier New";
                ctx.fillText("HIER", player.x - 2, player.y - 5);
            }

            // Optisches Feedback bei "Erwischt" (Bildschirm blitzt kurz rot auf)
            if (showCaughtTicker > 0) {
                ctx.fillStyle = "rgba(239, 68, 68, 0.3)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "20px Courier New";
                ctx.fillText("ERWISCHT! Zurück zum Start!", 150, 200);
            }

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
